<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup™ | Cloud Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-pitch: #0B0D12;        
            --bg-surface: #121722;      
            --bg-card: #181D29;         
            --bg-card-hover: #212838;
            
            --text-pure: #FFFFFF;
            --text-muted: #AAB0BC;
            
            --fifa-blue: #0A84FF;       
            --signal-red: #FF2442;
            --wire-line: rgba(255, 255, 255, 0.08);
            
            --font-ui: 'Inter', sans-serif;
            --font-head: 'Outfit', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-pitch); color: var(--text-pure);
            font-family: var(--font-ui); width: 100%; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* TOP BAR */
        .console-header {
            background-color: var(--bg-surface); border-bottom: 1px solid var(--wire-line);
            padding: 14px 32px; display: flex; justify-content: space-between; align-items: center;
        }
        .brand-logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: -0.5px;}
        .brand-logo span { color: var(--fifa-blue); }
        .sys-status { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 16px; }
        .live-tally-pill { background: rgba(255, 36, 66, 0.12); color: var(--signal-red); border: 1px solid rgba(255, 36, 66, 0.3); padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-weight: 700;}
        .live-tally-pill::before { content:''; width:6px; height:6px; background:var(--signal-red); border-radius:50%; }

        /* MASTER STAGE */
        .terminal-stage {
            max-width: 1760px; margin: 20px auto; padding: 0 20px;
            display: grid; grid-template-columns: 1fr 400px; gap: 20px; align-items: start;
        }

        .stage-left { display: flex; flex-direction: column; width: 100%; }

        .server-matrix-card { background-color: var(--bg-surface); border: 1px solid var(--wire-line); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
        .matrix-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}

        .pills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .server-pill {
            background-color: var(--bg-card); border: 1px solid var(--wire-line); color: var(--text-muted);
            padding: 9px 16px; border-radius: 6px; font-family: var(--font-ui); font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
        }
        .server-pill:hover { background-color: var(--bg-card-hover); color: var(--text-pure); border-color: rgba(255,255,255,0.2); }
        .server-pill.active { background-color: var(--fifa-blue); color: var(--text-pure); border-color: var(--fifa-blue); font-weight: 700; box-shadow: 0 0 15px rgba(10, 132, 255, 0.4); }

        .active-stream-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; margin-bottom: 12px; padding-left: 4px; display: flex; align-items: center; gap: 8px; }
        .active-stream-label span { color: var(--fifa-blue); font-family: var(--font-head); font-weight: 700;}

        /* 16:9 Video Player */
        .player-viewport {
            position: relative; width: 100%; aspect-ratio: 16 / 9; background-color: #000;
            border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .player-viewport iframe, .player-viewport video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 1;}

        .loader-screen {
            position: absolute; inset: 0; z-index: 5; background-color: var(--bg-pitch);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; transition: opacity 0.3s; pointer-events: none;
        }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--wire-line); border-top-color: var(--fifa-blue); border-radius: 50%; animation: sp 0.8s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }

        /* RIGHT SIDEBAR */
        .stage-right { background-color: var(--bg-surface); border: 1px solid var(--wire-line); border-radius: 12px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .sidebar-header { background-color: var(--bg-card); padding: 14px 20px; border-bottom: 1px solid var(--wire-line); font-family: var(--font-head); font-size: 0.95rem; font-weight: 800; color: var(--text-pure); text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-search { padding: 12px 16px; border-bottom: 1px solid var(--wire-line); }
        .sidebar-search input { width: 100%; background: var(--bg-card); border: 1px solid var(--wire-line); padding: 10px 14px; border-radius: 6px; color: #fff; outline: none; font-size: 0.85rem;}
        .sidebar-search input:focus { border-color: var(--fifa-blue); }

        .sidebar-body { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; max-height: 620px; }
        .sidebar-body::-webkit-scrollbar { width: 5px; }
        .sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        .match-feed-row { background-color: var(--bg-card); border: 1px solid var(--wire-line); padding: 12px 14px; border-radius: 8px; cursor: pointer; transition: 0.15s; display: flex; justify-content: space-between; align-items: center; }
        .match-feed-row:hover { border-color: var(--fifa-blue); background-color: var(--bg-card-hover); }
        .match-feed-row.active { border-color: var(--fifa-blue); border-left: 4px solid var(--fifa-blue); }

        .row-info { overflow: hidden; }
        .row-server { font-family: var(--font-head); font-size: 0.9rem; font-weight: 700; color: #fff; display: block;}
        .row-cat { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        @media (max-width: 1200px) { .terminal-stage { grid-template-columns: 1fr; } .stage-right { height: auto; margin-top: 20px; } .sidebar-body { max-height: 350px; } }
        @media (max-width: 768px) {
            .console-header { padding: 12px 20px; } .terminal-stage { padding: 0 12px; }
            .server-matrix-card { padding: 12px 12px; } .server-pill { padding: 8px 12px; font-size: 0.8rem; flex-grow: 1; text-align: center; }
            .player-viewport { border-radius: 8px; }
        }
    </style>
</head>
<body>

    <header class="console-header">
        <a href="#" class="brand-logo">FIFA<span>26</span></a>
        <div class="sys-status">
            <span id="sync-status">⚡ CLOUD SYNCED</span>
            <div class="live-tally-pill">LIVE</div>
        </div>
    </header>

    <main class="terminal-stage">
        
        <section class="stage-left">
            <div class="server-matrix-card">
                <div class="matrix-header">
                    <span>Available Relay Channels</span>
                    <span style="color:var(--fifa-blue);">AUTO-FETCH ENGINE</span>
                </div>
                <div class="pills-grid" id="pills-container"></div>
            </div>

            <div class="active-stream-label">
                ✅ &nbsp; Streaming: <span id="active-lbl">Loading...</span>
            </div>

            <div class="player-viewport">
                <div id="loader" class="loader-screen">
                    <div class="spinner"></div>
                    <span id="loader-txt" style="font-size:0.8rem; font-weight:600; color:var(--text-muted);">TUNING STREAM...</span>
                </div>
                <iframe id="iframe-player" src="" allowfullscreen allow="autoplay; encrypted-media" style="display:none;"></iframe>
                <video id="html-player" controls autoplay playsinline style="display:none; width:100%; height:100%; background:#000;"></video>
            </div>
        </section>

        <aside class="stage-right">
            <div class="sidebar-header">
                <span>⚡ Quick Switcher</span>
                <span style="font-size:0.75rem; color:var(--text-muted); font-weight:normal;" id="node-count">0 NODES</span>
            </div>
            <div class="sidebar-search">
                <input type="text" id="scan" placeholder="Filter channels by name..." oninput="renderUI()">
            </div>
            <div class="sidebar-body" id="sidebar-list"></div>
        </aside>

    </main>

    <script>
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

        // Fallback list inside code just in case GitHub takes 2 seconds to respond
        let rawServers = [
            { name: "US (EN) FS1", url: "https://xyzstreams.shop/wc-1-embed", category: "FIFA World Cup, 4K" },
            { name: "US (EN) FS1 4K (HEVC)", url: "https://junkieembeds.pages.dev/embed/fox4k-usa", category: "FIFA World Cup, 4K HEVC" },
            { name: "GB (EN) BBC", url: "https://junkieembeds.pages.dev/embed/bbc-4k", category: "Sports, HD" }
        ];

        let activeObj = null;

        const DOM = {
            pills: document.getElementById('pills-container'),
            sidebar: document.getElementById('sidebar-list'),
            iframe: document.getElementById('iframe-player'),
            video: document.getElementById('html-player'),
            loader: document.getElementById('loader'),
            loaderMsg: document.getElementById('loader-txt'),
            scan: document.getElementById('scan'),
            activeLbl: document.getElementById('active-lbl'),
            syncStatus: document.getElementById('sync-status'),
            nodeCount: document.getElementById('node-count')
        };

        // --- THE GHOST SYNC ENGINE (Superpower) ---
        async function fetchGitHubJSON() {
            try {
                // 💡 '?v=' + Date.now() is the holy grail. It forces browsers to bypass cache and grab your latest edit instantly!
                const response = await fetch('channels.json?v=' + Date.now());
                const data = await response.json();
                
                if(data && data.servers && data.servers.length > 0) {
                    rawServers = data.servers;
                    DOM.nodeCount.textContent = `${rawServers.length} NODES`;
                    
                    // First boot setup
                    if(!activeObj) {
                        dispatchStream(rawServers[0]);
                    } else {
                        // Check if the currently playing stream got a URL update in the JSON!
                        const liveUpdatedObj = rawServers.find(s => s.name === activeObj.name);
                        if(liveUpdatedObj && liveUpdatedObj.url !== activeObj.url) {
                            console.log("Ghost Engine detected URL change! Reloading player silently...");
                            dispatchStream(liveUpdatedObj);
                        }
                    }
                    renderUI();
                }
            } catch(e) {
                console.warn("Using offline cached relay list.");
            }
        }

        function renderUI() {
            // Render Pills
            DOM.pills.innerHTML = "";
            rawServers.forEach(s => {
                const p = document.createElement('button');
                p.className = `server-pill ${activeObj && activeObj.name === s.name ? 'active' : ''}`;
                p.textContent = s.name;
                p.onclick = () => dispatchStream(s);
                DOM.pills.appendChild(p);
            });

            // Render Sidebar
            DOM.sidebar.innerHTML = "";
            const q = DOM.scan.value.toLowerCase().trim();
            const filtered = rawServers.filter(s => !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));

            filtered.forEach(s => {
                const isP = activeObj && activeObj.name === s.name;
                const row = document.createElement('div');
                row.className = `match-feed-row ${isP ? 'active' : ''}`;
                row.onclick = () => dispatchStream(s);
                
                row.innerHTML = `
                    <div class="row-info">
                        <span class="row-server">${s.name}</span>
                        <span class="row-cat">${s.category.split(',')[0]}</span>
                    </div>
                    <span style="font-size:0.75rem; color:var(--text-muted); font-weight:700;">${isP ? '● PLAYING' : 'TUNE'}</span>
                `;
                DOM.sidebar.appendChild(row);
            });
        }

        let errTimer; let hls = null;
        function dispatchStream(targetObj) {
            activeObj = targetObj;
            DOM.activeLbl.textContent = targetObj.name;
            renderUI();

            DOM.loader.style.opacity = '1'; DOM.loaderMsg.style.color = 'var(--text-muted)';
            DOM.loaderMsg.textContent = `TUNING INTO ${targetObj.name.toUpperCase()}...`;

            clearTimeout(errTimer);
            if(hls) { hls.destroy(); hls = null; }
            DOM.video.pause(); DOM.video.removeAttribute('src'); DOM.video.load();
            DOM.iframe.src = "";

            const url = targetObj.url;
            const isM3U8 = url.includes('.m3u8') || url.includes('.ts');

            if(isM3U8) {
                DOM.iframe.style.display = 'none'; DOM.video.style.display = 'block';
                if(Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(url); hls.attachMedia(DOM.video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { DOM.video.play().catch(()=>{}); DOM.loader.style.opacity = '0'; });
                    hls.on(Hls.Events.ERROR, (e, d) => { if(d.fatal) fail(); });
                } else if(DOM.video.canPlayType('application/vnd.apple.mpegurl')) {
                    DOM.video.src = url; DOM.video.onloadedmetadata = () => { DOM.video.play(); DOM.loader.style.opacity = '0'; };
                    DOM.video.onerror = fail;
                }
                errTimer = setTimeout(fail, 12000);
            } else {
                DOM.video.style.display = 'none'; DOM.iframe.style.display = 'block'; DOM.iframe.src = url;
                setTimeout(() => { DOM.loader.style.opacity = '0'; }, 800);
            }
        }

        function fail() { DOM.loader.style.opacity = '1'; DOM.loaderMsg.style.color = '#0A84FF'; DOM.loaderMsg.textContent = 'STREAM PROTECTED / OFFLINE'; }

        // Boot up
        document.addEventListener('DOMContentLoaded', () => {
            fetchGitHubJSON();
            // 💡 Check GitHub silently every 2.5 minutes!
            setInterval(fetchGitHubJSON, 150000);
        });
    </script>
</body>
</html>
