<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RS 4K TV | FIFA WORLD CUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <!-- প্রিমিয়াম DRM এবং HLS ব্যাকআপ সাপোর্টের জন্য গুগলের Shaka Player লাইব্রেরি -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    
    <style>
        :root {
            --bg-base: #030305; --neon-green: #00ff66; --gold-primary: #d4af37;
            --gold-light: #f3e5ab; --electric-cyan: #00f0ff; --danger-red: #ff3333;
            --glass-bg: rgba(15, 20, 25, 0.4); --glass-border: rgba(255, 255, 255, 0.08);
            --font-ui: 'Inter', sans-serif; --font-display: 'Rajdhani', sans-serif; --font-signature: 'Great Vibes', cursive;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: var(--font-ui); background-color: var(--bg-base); color: #ffffff; min-height: 100vh; max-width: 100vw; overflow-x: hidden; position: relative; }
        #particles-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .animate-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; transform: translateY(30px); }
        .delay-1 { animation-delay: 0.2s; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); position: relative; overflow: hidden; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); width: 100%;}
        .glass-panel::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(212, 175, 55, 0.06), transparent 40%); z-index: 0; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .glass-panel:hover::before { opacity: 1; }
        .glass-panel:hover { transform: translateY(-5px); border-color: rgba(212, 175, 55, 0.3); }
        .border-trace { position: absolute; inset: 0; border-radius: 16px; padding: 2px; background: linear-gradient(90deg, transparent, var(--gold-primary), transparent); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.4s; }
        .glass-panel:hover .border-trace { opacity: 1; animation: trace 3s linear infinite; }
        @keyframes trace { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: linear-gradient(180deg, rgba(0,0,0,0.9), transparent); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); width: 100%;}
        .brand-name { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--gold-light), var(--gold-primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
        .header-meta { display: flex; align-items: center; gap: 30px; }
        .time-display { font-family: var(--font-display); font-size: 1.2rem; color: var(--electric-cyan); font-weight: 600; text-align: right; }
        .live-indicator { display: flex; align-items: center; gap: 8px; color: #fff; background: rgba(255,51,51,0.15); padding: 8px 16px; border-radius: 30px; border: 1px solid var(--danger-red); font-family: var(--font-display); font-weight: 700; letter-spacing: 1px; white-space: nowrap;}
        .live-dot { width: 10px; height: 10px; background: var(--danger-red); border-radius: 50%; animation: pulse-live 1.5s infinite; }
        .container { width: 100%; max-width: 1800px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 2.2fr 1fr; gap: 30px; box-sizing: border-box; }
        .player-wrapper { position: relative; width: 100%; padding-top: 56.25%; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(212, 175, 55, 0.1); }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }
        .player-overlay { position: absolute; inset: 0; z-index: 5; background: #000; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); text-align: center; padding: 20px; transition: opacity 0.4s ease; opacity: 0; pointer-events: none; }
        .category-bar { display: flex; gap: 10px; padding: 15px 25px 0; overflow-x: auto; scrollbar-width: none; width: 100%; }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #aaa; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: var(--font-ui); font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--electric-cyan); color: #000; border-color: var(--electric-cyan); }
        .server-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px 25px 25px; max-height: 450px; overflow-y: auto; width: 100%; }
        .channel-wrapper { display: flex; position: relative; flex: 1 1 calc(33.333% - 12px); min-width: 200px; }
        .server-btn { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; padding: 14px 45px 14px 20px; border-radius: 8px; font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .server-btn.active { background: rgba(212,175,55,0.15); border-color: var(--gold-primary); color: var(--gold-primary); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .fav-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 1.3rem; color: #444; cursor: pointer; z-index: 2; transition: 0.3s; padding: 5px; }
        .fav-btn.active { color: var(--gold-primary); }
        .panel-header { font-family: var(--font-display); font-size: 1.2rem; color: var(--gold-primary); border-bottom: 1px solid var(--glass-border); padding: 20px; display: flex; align-items: center; gap: 10px; }
        .panel-content { padding: 25px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .unavailable-text { font-family: var(--font-display); font-size: 1.2rem; color: #ff4444; text-align: center; }
        footer { margin-top: 60px; padding: 50px 20px; background: linear-gradient(0deg, #000, transparent); border-top: 1px solid rgba(212, 175, 55, 0.2); text-align: center; width: 100%;}
        .footer-logo { font-family: var(--font-display); font-size: 1.5rem; color: #fff; margin-bottom: 20px; }
        .signature { font-family: var(--font-signature); font-size: 2.5rem; color: var(--gold-primary); text-shadow: 0 0 15px var(--gold-primary); }
        @media (max-width: 768px) {
            header { padding: 15px; flex-direction: column; gap: 10px; align-items: flex-start; }
            .brand-name { font-size: 1.4rem; }
            .header-meta { width: 100%; justify-content: space-between; }
            .channel-wrapper { flex: 1 1 calc(50% - 10px); min-width: 140px; } 
        }
    </style>
</head>
<body>
    <canvas id="particles-bg"></canvas>
    <header>
        <div class="brand-name">🏆 RS 4K TV <span style="font-weight:400;">FIFA WORLD CUP</span></div>
        <div class="header-meta">
            <div>
                <div class="time-display" id="local-time">--:--:--</div>
            </div>
            <div class="live-indicator"><div class="live-dot"></div> LIVE BROADCAST</div>
        </div>
    </header>

    <main class="container">
        <div class="animate-up" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            <div class="player-wrapper">
                <div id="player-overlay" class="player-overlay"><span id="player-msg" style="font-size: 1.2rem; font-weight: 700;">CONNECTING...</span></div>
                <iframe id="main-iframe" src="" allowfullscreen="true" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" scrolling="no" frameborder="0" style="display:none;"></iframe>
                <div data-shaka-player-container style="width:100%; height:100%;">
                    <video id="main-video" autoplay playsinline style="display:none; width:100%; height:100%; background:#000;"></video>
                </div>
            </div>
            <div class="glass-panel">
                <div class="border-trace"></div>
                <div class="panel-header">📡 SELECT BROADCAST NETWORK</div>
                <div class="category-bar" id="category-container"></div>
                <div class="server-grid" id="server-container"></div>
            </div>
        </div>
        <div class="animate-up delay-1" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            <div class="glass-panel"><div class="panel-header">🔴 LIVE MATCH CENTER</div><div class="panel-content" id="api-live-match"><div class="unavailable-text">NO LIVE MATCHES CURRENTLY</div></div></div>
            <div class="glass-panel"><div class="panel-header">📅 UPCOMING MATCHES</div><div class="panel-content" id="api-fixtures"><div class="unavailable-text">NO MATCHES SCHEDULED FOR TODAY</div></div></div>
        </div>
    </main>

    <footer>
        <div class="footer-logo">🏆 RS 4K TV FIFA WORLD CUP</div>
        <div class="signature">Rs Rayhan Chowdhury</div>
    </footer>

    <script>
        let rawServers = [];
        let favorites = JSON.parse(localStorage.getItem('rs_favs')) || [];
        let activeCategory = "All";
        let currentPlayingUrl = "";
        let shakaPlayer = null;

        const serverContainer = document.getElementById('server-container');
        const categoryContainer = document.getElementById('category-container');
        const mainIframe = document.getElementById('main-iframe');
        const mainVideo = document.getElementById('main-video');
        const playerOverlay = document.getElementById('player-overlay');
        const playerMsg = document.getElementById('player-msg');

        // Shaka Player ইনিশিয়ালাইজেশন (ফিক্সড টাইপো 🛠️)
        async function initPlayer() {
            if (typeof shaka !== 'undefined') {
                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayer = new shaka.Player(mainVideo);
                    shakaPlayer.addEventListener('error', onPlayerError);
                } else {
                    console.error('Browser not supported for Shaka!');
                }
            }
        }

        function onPlayerError(error) {
            console.error('Shaka Error:', error);
            const currentChan = rawServers.find(s => s.url === currentPlayingUrl);
            if (currentChan && currentChan.embedUrl) {
                console.log("Switching to backup embed due to error...");
                switchToEmbed(currentChan.embedUrl);
            } else {
                playerOverlay.style.opacity = '1';
                playerMsg.innerHTML = 'Stream Offline or Blocked by CORS.';
            }
        }

        function switchToEmbed(embedUrl) {
            if(shakaPlayer) shakaPlayer.unload();
            mainVideo.style.display = 'none';
            mainIframe.style.display = 'block';
            mainIframe.src = embedUrl;
            playerOverlay.style.opacity = '0';
        }

        function renderCategories() {
            let allCats = [];
            rawServers.forEach(s => s.category ? s.category.split(',').forEach(c => allCats.push(c.trim())) : allCats.push("Others"));
            const categories = ["All", ...new Set(allCats)];
            categoryContainer.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${activeCategory === cat ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => { activeCategory = cat; renderCategories(); renderChannels(); };
                categoryContainer.appendChild(btn);
            });
        }

        function toggleFav(name) {
            favorites.includes(name) ? favorites = favorites.filter(n => n !== name) : favorites.push(name);
            localStorage.setItem('rs_favs', JSON.stringify(favorites));
            renderChannels();
        }

        function renderChannels() {
            serverContainer.innerHTML = "";
            let filtered = rawServers.filter(s => activeCategory === "All" || (s.category ? s.category.split(',').map(c => c.trim()).includes(activeCategory) : false));
            filtered.sort((a, b) => (favorites.includes(b.name) ? 1 : 0) - (favorites.includes(a.name) ? 1 : 0));
            
            filtered.forEach(server => {
                const wrapper = document.createElement('div');
                wrapper.className = 'channel-wrapper';
                const btn = document.createElement('button');
                btn.className = `server-btn ${currentPlayingUrl === server.url ? 'active' : ''}`;
                btn.innerHTML = `📺 ${server.name}`;
                btn.onclick = () => loadStream(server);
                
                const favIcon = document.createElement('span');
                favIcon.className = `fav-btn ${favorites.includes(server.name) ? 'active' : ''}`;
                favIcon.innerHTML = "★";
                favIcon.onclick = (e) => { e.stopPropagation(); toggleFav(server.name); };
                
                wrapper.appendChild(btn); wrapper.appendChild(favIcon); serverContainer.appendChild(wrapper);
            });
        }

        async function loadStream(server) {
            currentPlayingUrl = server.url;
            renderChannels();
            playerOverlay.style.opacity = '1';
            playerMsg.innerHTML = 'CONNECTING SECURELY...';
            
            mainIframe.src = "";
            if(shakaPlayer) await shakaPlayer.unload();

            if (server.type === 'mpd' && server.drm_type === 'clearkey') {
                mainIframe.style.display = 'none'; mainVideo.style.display = 'block';
                try {
                    shakaPlayer.configure({
                        drm: {
                            clearKeys: {
                                [server.keyId]: server.key
                            }
                        }
                    });
                    await shakaPlayer.load(server.url);
                    playerOverlay.style.opacity = '0';
                } catch (e) { onPlayerError(e); }
            } 
            else if (server.type === 'hls' || server.url.includes('.m3u8')) {
                mainIframe.style.display = 'none'; mainVideo.style.display = 'block';
                try {
                    await shakaPlayer.load(server.url);
                    playerOverlay.style.opacity = '0';
                } catch (e) { 
                    if(server.embedUrl) switchToEmbed(server.embedUrl);
                    else onPlayerError(e);
                }
            } 
            else {
                switchToEmbed(server.url);
            }
        }

        async function loadChannels() {
            try {
                const response = await fetch('./channels.json');
                const data = await response.json();
                rawServers = data.servers || [];
                renderCategories();
                renderChannels();
                if (rawServers.length > 0) loadStream(rawServers[0]);
            } catch (error) { console.error(error); }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await initPlayer();
            loadChannels();
            setInterval(() => { document.getElementById('local-time').textContent = new Date().toLocaleTimeString('en-US', {hour12: false}); }, 1000);
            
            const canvas = document.getElementById('particles-bg'); const ctx = canvas.getContext('2d'); let particles = [];
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas); resizeCanvas();
            class Particle {
                constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2; this.speedY = Math.random() * -0.5 - 0.1; this.opacity = Math.random() * 0.5 + 0.1; }
                update() { this.y += this.speedY; if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; } }
                draw() { ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            }
            for(let i=0; i<100; i++) particles.push(new Particle());
            function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
            animateParticles();
        });
    </script>
</body>
</html>
